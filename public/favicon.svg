<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="geometricPrecision">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>

  <!-- Black circle background -->
  <circle cx="50" cy="50" r="50" fill="#111111"/>

  <!-- Bold italic "q" clipped to circle so the tail crops naturally -->
  <g clip-path="url(#circle-clip)">
    <text
      x="55"
      y="83"
      font-family="'Arial Black', 'Helvetica Neue', Impact, Arial, sans-serif"
      font-size="98"
      font-weight="900"
      font-style="italic"
      fill="#f0f0f0"
      text-anchor="middle"
      transform="skewX(-6)"
    >q</text>
  </g>
</svg>
